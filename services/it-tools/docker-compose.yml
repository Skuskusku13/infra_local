networks:
  nginx:
    external: true


services:
  ###################################
  ############ IT TOOLS #############
  ###################################

  it-tools:
    image: 'ghcr.io/corentinth/it-tools:latest'
    container_name: it-tools
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: ittools.localhost
      VIRTUAL_PORT: 80
    networks:
      - nginx
