networks:
  nginx:
    external: true


services:
  ###################################
  ########### BEN TO PDF ############
  ###################################

  bentopdf:
    image: bentopdfteam/bentopdf-simple:latest
    container_name: bentopdf
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: btp.localhost
      VIRTUAL_PORT: 8080
      DISABLE_IPV6: false
    networks:
      - nginx